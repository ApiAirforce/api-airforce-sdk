# Dependabot version updates for the polyglot SDK (one ecosystem per language
# subdir; csharp omitted, no top-level manifest). Library semver-major bumps
# are filtered (handled manually); routine minor/patch land grouped weekly.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "pub"
    directory: "/dart"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    ignore:
