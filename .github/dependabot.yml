# Dependabot version updates for the polyglot SDK repo — one ecosystem per
# language subdir (csharp has no top-level manifest, so it is omitted).
# Security alerts/fixes live in repo settings; this drives grouped weekly PRs.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "pub"
    directory: "/dart"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "maven"
    directory: "/java"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "composer"
    directory: "/php"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "pip"
    directory: "/python"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
